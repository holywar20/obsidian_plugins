<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <!--
    Atmospheric nebula tile — feTurbulence fractalNoise.
    Sparse blue-purple cloud patches at max ~40% opacity.
    Tile stitches seamlessly (stitchTiles="stitch").
  -->
  <filter id="f" x="0" y="0" width="100%" height="100%">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.003 0.004"
      numOctaves="4"
      seed="7"
      stitchTiles="stitch"
    />
    <feColorMatrix
      type="matrix"
      values="0 0 0 0 0.10
              0 0 0 0 0.12
              0 0 0 0 0.28
              0 0 0 1.8 -1.4"
    />
  </filter>
  <rect width="600" height="600" filter="url(#f)"/>
</svg>
